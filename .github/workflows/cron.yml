name: daily-scrape

# Daily TikTok scrape + report dispatch. Belt-and-braces for the
# Vercel Cron in vercel.json — that's the primary trigger, this
# workflow runs slightly later as a backup in case Vercel's cron
# misses a day.
#
# GitHub Actions scheduled workflows can be delayed (or occasionally
# skipped) during high-load minutes. We use 23 / 40 — non-aligned
# minutes get prioritised over the heavily-contended :00 minute.
#
# Required configuration in the GitHub repo:
#   - Variable `APP_URL` — production URL, e.g.
#     `https://alertnetwork.vercel.app` (Settings → Secrets and
#     variables → Actions → Variables tab)
#   - Secret `CRON_SHARED_SECRET` — same value as Vercel env (either
#     `CRON_SHARED_SECRET` or `CRON_SECRET` — the routes accept both)

on:
  schedule:
    # 08:23 UTC every day — offset by ~10 mins from the Vercel cron
    # (08:13) to act as a backup, and on an off-the-hour minute to
    # avoid GitHub's contention queue.
    - cron: "23 8 * * *"
  # Manual trigger for ad-hoc runs from the Actions tab.
  workflow_dispatch:
    inputs:
      skip-scrape:
        description: "Skip the scrape step (only run report dispatch)"
        required: false
        default: "false"
      skip-reports:
        description: "Skip the report dispatch step"
        required: false
        default: "false"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Diagnostics
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "Triggered by: $EVENT_NAME"
          echo "Workflow run UTC: $(date -u --iso-8601=seconds)"
          echo "Vars + secrets check:"
          if [ -z "${{ vars.APP_URL }}" ]; then
            echo "::error::Repository variable APP_URL is not set."
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SHARED_SECRET }}" ]; then
            echo "::error::Repository secret CRON_SHARED_SECRET is not set."
            exit 1
          fi
          echo "  APP_URL is set"
          echo "  CRON_SHARED_SECRET is set"

      - name: Trigger daily scrape
        if: ${{ github.event.inputs.skip-scrape != 'true' }}
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          set -euo pipefail
          echo "POST ${APP_URL}/api/cron/daily"
          curl --fail-with-body \
            --silent --show-error \
            --max-time 300 \
            --request POST \
            --header "Authorization: Bearer ${CRON_SHARED_SECRET}" \
            --header "Content-Type: application/json" \
            "${APP_URL}/api/cron/daily"
          echo ""

      - name: Trigger report dispatch
        if: ${{ github.event.inputs.skip-reports != 'true' }}
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          set -euo pipefail
          echo "POST ${APP_URL}/api/cron/reports"
          # The route checks the UTC date and only sends weekly reports
          # on Mondays and monthly reports on the 1st. Off-days it
          # returns a no-op summary, which is fine.
          curl --fail-with-body \
            --silent --show-error \
            --max-time 60 \
            --request POST \
            --header "Authorization: Bearer ${CRON_SHARED_SECRET}" \
            --header "Content-Type: application/json" \
            "${APP_URL}/api/cron/reports"
          echo ""
